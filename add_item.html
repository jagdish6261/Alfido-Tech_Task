{% extends "base.html" %}

{% block content %}
    <h1>Add New Item</h1>
    <form method="POST">
        <div class="mb-3">
            <input type="text" name="item_name" class="form-control" placeholder="Enter item name" required>
        </div>
        <button type="submit" class="btn btn-primary">Save Item</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
